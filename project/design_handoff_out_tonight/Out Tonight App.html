<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Out Tonight — App Screens</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=Space+Grotesk:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; }
  body { font-family: 'Space Grotesk', sans-serif; }
  :root {
    /* Sapphire & Ruby — velvet sapphire bg, ruby primary, gold italic */
    --page:        #0c1538;
    --page-warm:   #16204a;
    --page-soft:   #1f2a5c;
    --page-card:   #1f2a5c;

    /* ink — pearl warm */
    --ink:         #efe5d2;
    --ink-soft:    #d4c7a8;
    --ink-dim:     rgba(239,229,210,0.62);
    --ink-faint:   rgba(239,229,210,0.32);
    --ink-hair:    rgba(239,229,210,0.14);
    --ink-mist:    rgba(239,229,210,0.06);

    /* gemstone accents */
    --red:         #c8243a;
    --red-deep:    #9c1c2c;
    --wine:        #e8a832;
    --wine-soft:   rgba(232,168,50,0.12);
    --gold:        #e8a832;
    --page-vignette: rgba(0,0,0,0.45);

    /* type */
    --serif:   'Playfair Display', 'Cormorant Garamond', serif;
    --cormorant:'Cormorant Garamond', serif;
    --sans:    'Space Grotesk', sans-serif;
    --mono:    'JetBrains Mono', ui-monospace, monospace;
  }
  .serif    { font-family: var(--serif); }
  .cormorant{ font-family: var(--cormorant); }
  .sans     { font-family: var(--sans); }
  .mono     { font-family: var(--mono); }
  .italic   { font-style: italic; }
  .uppercase{ text-transform: uppercase; }
  .text     { color: var(--ink); }
  .text-soft{ color: var(--ink-soft); }
  .text-dim { color: var(--ink-dim); }
  .text-faint{color: var(--ink-faint); }
  .red      { color: var(--red); }
  .wine     { color: var(--wine); }
  .gold     { color: var(--gold); }
  .rule-h   { background: var(--ink-hair); height: 1px; }

  /* optical adjustment for italic Playfair */
  .word { line-height: 0.95; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="marks.jsx?v=4"></script>
<script type="text/babel" src="screen-shell.jsx?v=3"></script>
<script type="text/babel" src="palettes.jsx?v=2"></script>
<script type="text/babel" src="screens-onboarding-input.jsx?v=2"></script>
<script type="text/babel" src="screens-cards.jsx?v=3"></script>
<script type="text/babel" src="screens-matches-profile.jsx?v=2"></script>

<script type="text/babel">
  const { useEffect, useState } = React;

  function App() {
    const [ready, setReady] = useState(false);
    useEffect(() => {
      document.fonts.ready.then(() => setReady(true));
      const t = setTimeout(() => setReady(true), 1500);
      return () => clearTimeout(t);
    }, []);

    if (!ready) return <div style={{height:'100vh',background:'#0c1538'}} />;

    const W = window.OT_W;
    const H = window.OT_H;

    return (
      <DesignCanvas>

        <DCSection id="onboarding" title="01 · Onboarding" subtitle="Splash + Google sign-in">
          <DCArtboard id="a1" label="A1 · Splash / Sign in" width={W} height={H}>
            <SplashScreen />
          </DCArtboard>
        </DCSection>

        <DCSection id="input" title="02 · Setting the night" subtitle="Where, when, who, the vibe, the budget">
          <DCArtboard id="b1" label="B1 · Preferences (filled)" width={W} height={H}>
            <InputFormScreen />
          </DCArtboard>
          <DCArtboard id="b2" label="B2 · Generating deck" width={W} height={H}>
            <LoadingScreen />
          </DCArtboard>
        </DCSection>

        <DCSection id="discover" title="03 · Discover · the deck" subtitle="Swipe card states — front, flipped, like, pass, end of deck">
          <DCArtboard id="c1" label="C1 · Card front" width={W} height={H}>
            <CardFrontScreen />
          </DCArtboard>
          <DCArtboard id="c2" label="C2 · Card back (flipped)" width={W} height={H}>
            <CardBackScreen />
          </DCArtboard>
          <DCArtboard id="c3" label="C3 · Swipe right (saved)" width={W} height={H}>
            <CardLikeScreen />
          </DCArtboard>
          <DCArtboard id="c4" label="C4 · Swipe left (pass)" width={W} height={H}>
            <CardPassScreen />
          </DCArtboard>
          <DCArtboard id="c5" label="C5 · That's a wrap" width={W} height={H}>
            <EndOfDeckScreen />
          </DCArtboard>
        </DCSection>

        <DCSection id="matches" title="04 · Saved matches" subtitle="List, expanded detail, empty state">
          <DCArtboard id="d1" label="D1 · Matches list" width={W} height={H}>
            <MatchesListScreen />
          </DCArtboard>
          <DCArtboard id="d2" label="D2 · Match detail (expanded)" width={W} height={H}>
            <MatchDetailScreen />
          </DCArtboard>
          <DCArtboard id="d3" label="D3 · Empty state" width={W} height={H}>
            <MatchesEmptyScreen />
          </DCArtboard>
        </DCSection>

        <DCSection id="profile" title="05 · Profile" subtitle="Account, swipe history, sign out">
          <DCArtboard id="e1" label="E1 · Profile" width={W} height={H}>
            <ProfileScreen />
          </DCArtboard>
        </DCSection>

      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
